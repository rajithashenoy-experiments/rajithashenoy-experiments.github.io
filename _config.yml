title: My Musings
description: Papers and thoughts.
author: Rajitha Shenoy
baseurl: ""
url: ""

markdown: kramdown
permalink: /:year/:month/:day/:title/

plugins:
  - jekyll-feed
  - jekyll-sitemap

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - .gitignore
  - .git
  - .github
  - .vscode
  - .DS_Store
  - .env
  - .env.local
  - .env.development.local
  - .env.test.local
  - .env.production.local
  