---
layout: default
---
<article class="post">
  <h1 class="post-title">{{ page.title }}</h1>
  <p class="post-meta">{{ page.date | date: "%B %-d, %Y" }}</p>
  <div class="post-content">
    {{ content }}
  </div>
</article>

<p class="back-link"><a href="{{ '/' | relative_url }}">&larr; Back to all writing</a></p>
